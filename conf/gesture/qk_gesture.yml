data_dir: data/DVSGesturedataset/
dataset: gesture
pretrained: False
num_classes: 11
num_heads: 16
img_size: 128
crop_pct: 1.0
scale:
    - 1.0
    - 1.0
ratio: [1.0, 1.0]
color_jitter: 0.
interpolation: bicubic
train_interpolation: bicubic
use_conv_as_linear: true
in_channels: 2
time_steps: 16
layer: 2
dim: 256
mlp-ratio: 4

# Model Exponential Moving Average
mixup: 0.5
mixup_off_epoch: 0
mixup_prob: 0.5
mixup_mode: batch
mixup_switch_prob: 0.5
cutmix: 0.0

# Misc
seed: 42
amp: True
channels-last: False
batch_size: 16
val_batch_size: 16
lr: 1e-3
min_lr: 2e-5
sched: cosine
weight_decay: 6e-2
epochs: 200
cooldown_epochs: 10
warmup_epochs: 10
decay_epochs: 20
warmup_lr: 1e-5
opt: adamw
smoothing: 0.1
workers: 8